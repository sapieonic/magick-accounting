service: magick-accounting-infra

provider:
  name: aws
  region: ${opt:region, 'ap-south-1'}
  stage: ${opt:stage, 'prod'}

resources:
  Resources:
    ReceiptsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: magick-accounting-receipts-${self:provider.stage}
        OwnershipControls:
          Rules:
            - ObjectOwnership: BucketOwnerEnforced
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        BucketEncryption:
          ServerSideEncryptionConfiguration:
            - ServerSideEncryptionByDefault:
                SSEAlgorithm: AES256
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - "Content-Type"
              AllowedMethods:
                - GET
                - PUT
              AllowedOrigins:
                - "*"
              MaxAge: 3600
        LifecycleConfiguration:
          Rules:
            - Id: CleanupIncompleteUploads
              Status: Enabled
              AbortIncompleteMultipartUpload:
                DaysAfterInitiation: 1
        Tags:
          - Key: Project
            Value: magick-accounting
          - Key: Environment
            Value: ${self:provider.stage}

  Outputs:
    ReceiptsBucketName:
      Description: Name of the S3 bucket for receipt storage
      Value: !Ref ReceiptsBucket
    ReceiptsBucketArn:
      Description: ARN of the S3 bucket
      Value: !GetAtt ReceiptsBucket.Arn
