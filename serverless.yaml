service: magick-accounting-infra

provider:
  name: aws
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'prod'}

resources:
  Resources:
    ReceiptsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: magick-accounting-receipts-${self:provider.stage}
        AccessControl: Private
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - "*"
              AllowedMethods:
                - GET
                - PUT
              AllowedOrigins:
                - "*"
              MaxAge: 3600
        LifecycleConfiguration:
          Rules:
            - Id: CleanupIncompleteUploads
              Status: Enabled
              AbortIncompleteMultipartUpload:
                DaysAfterInitiation: 1
        Tags:
          - Key: Project
            Value: magick-accounting
          - Key: Environment
            Value: ${self:provider.stage}

    ReceiptsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref ReceiptsBucket
        PolicyDocument:
          Statement:
            - Sid: DenyUnencryptedObjectUploads
              Effect: Deny
              Principal: "*"
              Action: s3:PutObject
              Resource: !Sub "${ReceiptsBucket.Arn}/*"
              Condition:
                StringNotEquals:
                  s3:x-amz-server-side-encryption: AES256

  Outputs:
    ReceiptsBucketName:
      Description: Name of the S3 bucket for receipt storage
      Value: !Ref ReceiptsBucket
    ReceiptsBucketArn:
      Description: ARN of the S3 bucket
      Value: !GetAtt ReceiptsBucket.Arn
